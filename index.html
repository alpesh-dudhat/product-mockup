  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

yframes spin { to { transform: rotate(360deg); } }\n  .cb-canvas-wrap {\n    background-color:#e2e8f0;\n    background-image: linear-gradient(45deg,#cbd5e1 25%,transparent 25%), linear-gradient(-45deg,#cbd5e1 25%,transparent 25%), linear-gradient(45deg,transparent 75%,#cbd5e1 75%), linear-gradient(-45deg,transparent 75%,#cbd5e1 75%);\n    background-size:16px 16px;\n    background-position:0 0,0 8px,8px -8px,-8px 0px;\n  }\n  .cb-side-btn { display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;background:#fff;color:#334155;border:1.5px solid #e2e8f0;border-radius:6px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;text-align:left; }\n  .cb-side-heading { font:700 11px 'DM Sans',sans-serif;color:#0f172a;text-transform:uppercase;letter-spacing:.6px;border-bottom:1.5px solid #f1f5f9;padding-bottom:7px;margin-bottom:8px; }\n  .cb-side-section { padding:12px 14px;border-bottom:1.5px solid #f1f5f9;display:flex;flex-direction:column;gap:6px; }\n  .cb-icon-btn { display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:#fff;color:#334155;border:1.5px solid #e2e8f0;border-radius:8px;font-size:17px;cursor:pointer;flex-shrink:0; }\n  .cb-icon-btn:hover { border-color:#cbd5e1;background:#f8fafc; }\n  .cb-icon-btn.danger { background:#fff5f5;color:#ef4444;border-color:#fecaca; }\n  .cb-icon-btn.magic { background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe; }\n  .cb-icon-btn.accent { background:#3498B5;color:#fff;border:none;font-weight:700; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100vh;background:#f1f5f9;display:flex;flex-direction:column;overflow:hidden;\">\n\n  <!-- hidden file inputs -->\n  <input type=\"file\" accept=\"image/png,image/jpeg,image/webp\" ref=\"{{ mainImgInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleMainImageChange }}\">\n  <input type=\"file\" accept=\"image/png,image/jpeg,image/svg+xml,image/webp,.ai,.eps\" multiple=\"true\" ref=\"{{ logoInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleLogoChange }}\">\n  <input type=\"file\" accept=\"image/png,image/jpeg,image/webp\" ref=\"{{ bgImgInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleBgImageChange }}\">\n  <input type=\"file\" accept=\"image/png,image/jpeg,image/webp\" ref=\"{{ clientLogoInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleClientLogoChange }}\">\n  <input type=\"file\" accept=\"image/png,image/jpeg,image/svg+xml,image/webp\" ref=\"{{ companyLogoInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleCompanyLogoChange }}\">\n  <input type=\"file\" accept=\".zip\" ref=\"{{ importInputRef }}\" style=\"display:none\" sc-camel-on-change=\"{{ handleImportChange }}\">\n\n  <!-- TOP BAR -->\n  <div style=\"display:flex;align-items:center;height:56px;background:#0f172a;padding:0 20px;gap:14px;flex-shrink:0;\">\n    <div style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\" title=\"Click to change your company logo (saved as default)\" sc-camel-on-click=\"{{ triggerCompanyLogoUpload }}\">\n      <img ref=\"{{ companyLogoImgRef }}\" src=\"edfe2eb8-d3a2-4a1c-905e-d735a13ca860\" style=\"height:28px;max-width:130px;object-fit:contain;\" alt=\"{{ companyName }}\">\n    <\u002Fdiv>\n    <div style=\"width:1px;height:20px;background:#1e293b;\"><\u002Fdiv>\n    <div style=\"font:500 12px 'DM Sans',sans-serif;color:#64748b;\">Mockup Builder<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:6px 10px;background:#1e293b;color:#cbd5e1;border-radius:6px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ toggleLeftPanel }}\">☰ {{ leftPanelToggleLabel }}<\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;gap:6px;\">\n      <div style=\"width:6px;height:6px;background:#10b981;border-radius:50%;\"><\u002Fdiv>\n      <span style=\"font:400 11px 'DM Sans',sans-serif;color:#94a3b8;\">{{ saveStatusLabel }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:#1e293b;color:#cbd5e1;border-radius:6px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ openOdooModal }}\">🔗 Odoo<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:#1e293b;color:#cbd5e1;border-radius:6px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ triggerImport }}\">⬆ Import<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:#1e293b;color:#cbd5e1;border-radius:6px;font:500 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ downloadBackup }}\">⬇ Backup<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:#334155;color:#fff;border-radius:6px;font:600 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ saveDraftNow }}\">💾 Save Draft<\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:{{ accentColor }};color:#fff;border-radius:6px;font:600 12px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ openExportModal }}\">↓ Export PDF<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ITEM TABS -->\n  <div style=\"display:flex;align-items:stretch;background:#f8fafc;border-bottom:1.5px solid #e2e8f0;padding:0 16px;gap:2px;flex-shrink:0;overflow-x:auto;\">\n    <sc-for list=\"{{ items }}\" as=\"item\" hint-placeholder-count=\"1\">\n      <sc-if value=\"{{ item.isActive }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border:1.5px solid #e2e8f0;border-bottom:none;border-radius:8px 8px 0 0;margin-bottom:-1.5px;font:600 13px 'DM Sans',sans-serif;color:#0f172a;white-space:nowrap;cursor:pointer;z-index:2;position:relative;\">\n          <div style=\"width:8px;height:8px;background:{{ accentColor }};bor ursor:pointer;padding:12px 14px;\" sc-camel-on-click=\"{{ toggleCopyPanel }}\">\n              <div class=\"cb-side-heading\" style=\"color:#92400e;border-bottom:none;padding-bottom:0;margin-bottom:0;\">⚡ Copy from {{ firstItemLabel }}<\u002Fdiv>\n              <span style=\"font-size:11px;color:#92400e;\">{{ copyPanelChevron }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ copyPanelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 14px 12px;display:flex;flex-direction:column;gap:6px;\">\n                <sc-for list=\"{{ copyFlagList }}\" as=\"flag\" hint-placeholder-count=\"5\">\n                  <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\" sc-camel-on-click=\"{{ flag.toggle }}\">\n                    <sc-if value=\"{{ flag.checked }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"width:15px;height:15px;background:#f59e0b;border-radius:3px;border:1.5px solid #f59e0b;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                        <div style=\"width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-1px;\"><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ flag.unchecked }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"width:15px;height:15px;background:#fff;border-radius:3px;border:1.5px solid #fcd34d;flex-shrink:0;\"><\u002Fdiv>\n                    <\u002Fsc-if>\n                    <span style=\"font:500 12px 'DM Sans',sans-serif;color:#78350f;\">{{ flag.label }}<\u002Fspan>\n                  <\u002Flabel>\n                <\u002Fsc-for>\n                <div style=\"font:400 10px 'DM Sans',sans-serif;color:#b45309;\">Unticking restores your own edits<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n DM Sans',sans-serif;color:#0f172a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;\">🖼 Product Photo &amp; Notes Style<\u002Fdiv>\n          <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Photo Size ({{ exportSettings.photoSizePct }}% of card)<\u002Fdiv>\n          <input type=\"range\" min=\"25\" max=\"78\" value=\"{{ exportSettings.photoSizePct }}\" sc-camel-on-change=\"{{ updatePhotoSizePct }}\" style=\"width:100%;margin-bottom:10px;\">\n          <div style=\"display:flex;gap:10px;margin-bottom:10px;\">\n            <div style=\"flex:1;\">\n              <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Notes Font Size ({{ exportSettings.notesFontSize }}pt)<\u002Fdiv>\n              <input type=\"range\" min=\"9\" max=\"22\" value=\"{{ exportSettings.notesFontSize }}\" sc-camel-on-change=\"{{ updateNotesFontSize }}\" style=\"width:100%;\">\n            <\u002Fdiv>\n            <div style=\"flex:0 0 90px;\">\n              <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Notes Colour<\u002Fdiv>\n              <input type=\"color\" value=\"{{ exportSettings.notesColor }}\" sc-camel-on-change=\"{{ updateNotesColor }}\" style=\"width:100%;height:34px;border:1.5px solid #e2e8f0;border-radius:6px;cursor:pointer;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Live preview -->\n          <div style=\"border:1.5px dashed #e2e8f0;border-radius:8px;padding:10px;background:#f8fafc;margin-bottom:10px;\">\n            <div style=\"font:600 10px 'DM Sans',sans-serif;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;\">Live Preview<\u002Fdiv>\n            <sc-if value=\"{{ isVerticalOrientation }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:6px;background:#fff;border:1.5px solid #f1f5f9;border-radius:8px;padding:8px;height:130px;\">\n                <div style=\"flex:0 0 {{ exportSettings.photoSizePct }}%;background:#f1f5f9;border-radius:6px;\"><\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;\">\n                  <div style=\"height:6px;width:70%;background:#e2e8f0;border-radius:2px;\"><\u002Fdiv>\n                  <div style=\"height:5px;width:50%;background:#f1f5f9;border-radius:2px;\"><\u002Fdiv>\n                  <div style=\"font-size:{{ notesPreviewFontSize }}px;color:{{ exportSettings.notesColor }};font-weight:400;\">Note: sample text<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isHorizontalOrientation }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;gap:8px;background:#fff;border:1.5px solid #f1f5f9;border-radius:8px;padding:8px;height:80px;\">\n                <div style=\"flex:0 0 {{ exportSettings.photoSizePct }}%;background:#f1f5f9;border-radius:6px;\"><\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;\">\n                  <div style=\"height:6px;width:70%;background:#e2e8f0;border-radius:2px;\"><\u002Fdiv>\n                  <div style=\"height:5px;width:50%;background:#f1f5f9;border-radius:2px;\"><\u002Fdiv>\n                  <div style=\"font-size:{{ notesPreviewFontSize }}px;color:{{ exportSettings.notesColor }};font-weight:400;\">Note: sample text<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Footer Disclaimer (every page)<\u002Fdiv>\n          <textarea value=\"{{ exportSettings.disclaimerText }}\" sc-camel-on-change=\"{{ updateDisclaimerText }}\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;resize:vertical;min-height:44px;margin-bottom:10px;\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <div style=\"height:1.5px;background:#f1f5f9;\"><\u002Fdiv>\n\n        <div>\n          <div style=\"font:700 12px 'DM Sans',sans-serif;color:#0f172a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;\">Notes &amp; Options<\u002Fdiv>\n          <textarea value=\"{{ exportSettings.extraNotes }}\" sc-camel-on-change=\"{{ updateExtraNotes }}\" placeholder=\"Proof approved, production notes…\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;resize:vertical;min-height:56px;margin-bottom:10px;\"><\u002Ftextarea>\n          <div style=\"display:flex;flex-direction:column;gap:6px;\">\n            <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\" sc-camel-on-click=\"{{ togglePageNumbers }}\">\n              <sc-if value=\"{{ exportSettings.includePageNumbers }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:15px;height:15px;background:{{ accentColor }};border-radius:3px;\"><\u002Fdiv><\u002Fsc-if>\n              <sc-if value=\"{{ notIncludePageNumbers }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:15px;height:15px;background:#fff;border-radius:3px;border:1.5px solid #cbd5e1;\"><\u002Fdiv><\u002Fsc-if>\n              <span style=\"font-size:13px;\">Include page numbers<\u002Fspan>\n            <\u002Flabel>\n            <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\" sc-camel-on-click=\"{{ toggleTerms }}\">\n              <sc-if value=\"{{ exportSettings.includeTerms }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:15px;height:15px;background:{{ accentColor }};border-radius:3px;\"><\u002Fdiv><\u002Fsc-if>\n              <sc-if value=\"{{ notIncludeTerms }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:15px;height:15px;background:#fff;border-radius:3px;border:1.5px solid #cbd5e1;\"><\u002Fdiv><\u002Fsc-if>\n              <span style=\"font-size:13px;\">Terms &amp; conditions (footer, every page)<\u002Fspan>\n            <\u002Flabel>\n            <sc-if value=\"{{ exportSettings.includeTerms }}\" hint-placeholder-val=\"{{ false }}\">\n              <textarea value=\"{{ exportSettings.termsText }}\" sc-camel-on-change=\"{{ updateTermsText }}\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;resize:vertical;min-height:56px;\"><\u002Ftextarea>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:flex-end;gap:10px;padding-top:4px;\">\n          <div style=\"display:inline-flex;align-items:center;padding:8px 16px;background:#fff;color:#0f172a;border:1.5px solid #e2e8f0;border-radius:7px;font:500 13px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ closeExportModal }}\">Cancel<\u002Fdiv>\n          <sc-if value=\"{{ exporting }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#94a3b8;color:#fff;border-radius:7px;font:600 13px 'DM Sans',sans-serif;\">\n              <span style=\"display:inline-block;width:12px;height:12px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;\"><\u002Fspan> Generating…\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notExporting }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:{{ accentColor }};color:#fff;border-radius:7px;font:600 13px 'DM Sans',sans-serif;cursor:pointer;\" sc-camel-on-click=\"{{ generatePDF }}\">↓ Generate HD PDF<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ODOO MODAL (stub) -->\n  <sc-if value=\"{{ odooModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;\" sc-camel-on-click=\"{{ closeOdooModal }}\">\n      <div style=\"background:#fff;border-radius:14px;width:440px;padding:28px;display:flex;flex-direction:column;gap:16px;\" sc-camel-on-click=\"{{ stopPropagation }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;\">\n          <div>\n            <div style=\"font:700 20px 'DM Sans',sans-serif;color:#0f172a;\">🔗 Odoo Integration<\u002Fdiv>\n            <div style=\"display:inline-flex;margin-top:6px;padding:3px 9px;background:#fef3c7;color:#92400e;border-radius:20px;font:600 11px 'DM Sans',sans-serif;\">Coming soon<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:7px;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#94a3b8;cursor:pointer;\" sc-camel-on-click=\"{{ closeOdooModal }}\">×<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font:400 13px 'DM Sans',sans-serif;color:#64748b;line-height:1.6;margin:0;\">Connect your Odoo instance to pull product details, client info, and push finished mockups straight into Sales Orders and Invoices.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;opacity:.5;pointer-events:none;\">\n          <div>\n            <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Odoo URL<\u002Fdiv>\n            <input placeholder=\"https://yourcompany.odoo.com\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;background:#f8fafc;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">Database<\u002Fdiv>\n            <input placeholder=\"mycompany-prod\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;background:#f8fafc;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font:600 11px 'DM Sans',sans-serif;color:#475569;text-transform:uppercase;margin-bottom:5px;\">API Key<\u002Fdiv>\n            <input type=\"password\" placeholder=\"••••••••••••\" style=\"width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;background:#f8fafc;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;background:#cbd5e1;color:#fff;border-radius:7px;font:600 13px 'DM Sans',sans-serif;width:100%;\">Connect (Coming Soon)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;companyName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;PromoWear.ie&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#3498B5&quot;,&quot;options&quot;:[&quot;#3498B5&quot;,&quot;#2563eb&quot;,&quot;#7c3aed&quot;,&quot;#059669&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  canvasRef = React.createRef();\n  mainImgInputRef = React.createRef();\n  logoInputRef = React.createRef();\n  bgImgInputRef = React.createRef();\n  clientLogoInputRef = React.createRef();\n  companyLogoInputRef = React.createRef();\n  importInputRef = React.createRef();\n  canvasWrapOuterRef = React.createRef();\n  fabricCanvas = null;\n  history = {};\n  isApplyingHistory = false;\n  perspectiveHandles = [];\n  perspectiveTargetObj = null;\n  perspectivePreviewImg = null;\n  perspectivePreviewDataUrl = null;\n  cropTargetObj = null;\n  cropRect = null;\n  copySnapshots = {};\n  resizeDragStart = null;\n  resizeCanvasToFit = ()=>{\n    const wrap = this.canvasRef.current && this.canvasRef.current.closest('.cb-canvas-wrap');\n    if(!wrap || !this.fabricCanvas) return;\n    const rect = wrap.getBoundingClientRect();\n    const padding = 24;\n    const size = Math.max(180, Math.min(600, rect.width-padding, rect.height-padding));\n    this.applyCanvasSize(size);\n  };\n  applyCanvasSize(size){\n    const scale = size/600;\n    const wrapperEl = this.fabricCanvas && this.fabricCanvas.wrapperEl;\n    if(wrapperEl){\n      wrapperEl.style.transformOrigin = '0 0';\n      wrapperEl.style.transform = 'scale('+scale+')';\n    }\n    if(this.state.canvasDisplaySize !== size) this.setState({canvasDisplaySize:size});\n  }\n  startCanvasResize(e){\n    e.preventDefault();\n    this.resizeDragStart = { x:e.clientX, y:e.clientY, size:this.state.canvasDisplaySize };\n    window.addEventListener('mousemove', this.onCanvasResizeMove);\n    window.addEventListener('mouseup', this.onCanvasResizeEnd);\n  }\n  onCanvasResizeMove = (e)=>{\n    if(!this.resizeDragStart) return;\n    const delta = Math.max(e.clientX-this.resizeDragStart.x, e.clientY-this.resizeDragStart.y);\n    const wrap = this.canvasRef.current && this.canvasRef.current.closest('.cb-canvas-wrap');\n    const rect = wrap ? wrap.getBoundingClientRect() : {width:600,height:600};\n    const maxSize = Math.min(900, rect.width-24, rect.height-24);\n    const size = Math.max(180, Math.min(maxSize, this.resizeDragStart.size+delta));\n    this.applyCanvasSize(size);\n  };\n  onCanvasResizeEnd = ()=>{\n    this.resizeDragStart = null;\n    window.removeEventListener('mousemove', this.onCanvasResizeMove);\n    window.removeEventListener('mouseup', this.onCanvasResizeEnd);\n  };\n  saveTimer = null;\n  db = null;\n\n  uid(){ return 'id-' + Math.random().toString(36).slice(2,9) + Date.now().toString(36); }\n\n  makeItem(index){\n    return {\n      id: this.uid(),\n      label: 'Item '+index,\n      autoLabel: true,\n      mainImageAssetId: null,\n      canvasBgColor: '#ffffff',\n      canvasBgAssetId: null,\n      logoAssetIds: [],\n      canvasJSON: null,\n      detailsMode: 'structured',\n      freeformHtml: '',\n      details: { productName:'', sku:'', quantity:'', size:'', colour:'', material:'', decorationType:'Embroidery', placement:'', artworkW:'', artworkH:'', threadColour:'', price:'', notes:'', other:'' }\n    };\n  }\n\n  renumberItems(items){\n    return items.map((it,i)=> it.autoLabel ? {...it, label:'Item '+(i+1)} : it);\n  }\n\n  defaultCopyFlags(){ return { logos:false, position:false, size:false, details:false, decoration:false }; }\n\n  state = (() => {\n    const item0 = this.makeItem(1);\n    return {\n      items: [item0],\n      activeItemId: item0.id,\n      copyFlags: this.defaultCopyFlags(),\n      clientInfo: { name:'', company:'', logoAssetId:null },\n      companyLogoAssetId: null,\n      exportSettings: { orientation:'h', perPage:1, quoteNumber:'', date: new Date().toISOString().slice(0,10), extraNotes:'', includeTerms:false, includePageNumbers:true, termsText:'All artwork remains the property of the client. Production adjustments may be made where necessary. Colours shown are approximate; final production colours may vary slightly from on-screen proofs.', companyLogoHeight:68, clientLogoHeight:26, photoSizePct:52, disclaimerText:'Visual for artwork position and approximate scale only. Final garment shade, print finish and embroidery appearance may vary slightly in production.', notesFontSize:15, notesColor:'#dc2626' },\n      exportModalOpen:false,\n      odooModalOpen:false,\n      saveStatus:'saved',\n      assets:{},\n      selectedObjType:null,\n      perspectiveActive:false,\n      cropActive:false,\n      bgColorPopoverOpen:false,\n      shirtLocked:true,\n      exporting:false,\n      loaded:false,\n      canvasDisplaySize:600,\n      canvasBaseSize:600,\n      zoomLevel:1,\n      leftPanelVisible:true,\n      copyPanelOpen:false,\n      renderTick:0\n    };\n  })();\n\n  componentDidMount(){\n    window.addEventListener('keydown', this.handleKeyDown);\n    this.waitForLibs().then(()=>this.initDB()).then(()=>this.loadPersistedState()).then(()=>{\n      this.setState({loaded:true}, ()=>{ this.initCanvas(); this.syncCompanyLogoImg(); });\n    }).catch(err=>{\n      console.error('init failed', err);\n      this.setState({loaded:true}, ()=>{ this.initCanvas(); this.syncCompanyLogoImg(); });\n    });\n  }\n\n  handleKeyDown = (e)=>{\n    const tag = document.activeElement && document.activeElement.tagName;\n    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;\n    const key = e.key.toLowerCase();\n    if((e.ctrlKey||e.metaKey) && !e.shiftKey && key==='z'){ e.preventDefault(); this.undo(); }\n    else if((e.ctrlKey||e.metaKey) && (key==='y' || (e.shiftKey && key==='z'))){ e.preventDefault(); this.redo(); }\n    else if((key==='delete' || key==='backspace') && !this.state.perspectiveActive && !this.state.cropActive){ e.preventDefault(); this.deleteSelected(); }\n  };\n\n  waitForLibs(){\n    return new Promise(resolve=>{\n      const check=()=>{ if(window.fabric && window.jspdf && window.JSZip) resolve(); else setTimeout(check,60); };\n      check();\n    });\n  }\n\n  initDB(){\n    return new Promise((resolve,reject)=>{\n      const req = indexedDB.open('promowear_mockup_db', 1);\n      req.onupgradeneeded = (e)=>{\n        const db = e.target.result;\n        if(!db.objectStoreNames.contains('assets')) db.createObjectStore('assets',{keyPath:'id'});\n        if(!db.objectStoreNames.contains('state')) db.createObjectStore('state',{keyPath:'key'});\n      };\n      req.onsuccess = ()=>{ this.db = req.result; resolve(); };\n      req.onerror = ()=>reject(req.error);\n    });\n  }\n\n  idbGet(store,key){\n    return new Promise((resolve,reject)=>{\n      const tx = this.db.transaction(store,'readonly');\n      const req = tx.objectStore(store).get(key);\n      req.onsuccess = ()=>resolve(req.result);\n      req.onerror = ()=>reject(req.error);\n    });\n  }\n  idbPut(store,val){\n    return new Promise((resolve,reject)=>{\n      const tx = this.db.transaction(store,'readwrite');\n      const req = tx.objectStore(store).put(val);\n      req.onsuccess = ()=>resolve();\n      req.onerror = ()=>reject(req.error);\n    });\n  }\n  idbGetAll(store){\n    return new Promise((resolve,reject)=>{\n      const tx = this.db.transaction(store,'readonly');\n      const req = tx.objectStore(store).getAll();\n      req.onsuccess = ()=>resolve(req.result||[]);\n      req.onerror = ()=>reject(req.error);\n    });\n  }\n\n  loadPersistedState(){\n    return this.idbGet('state','current').then(rec=>{\n      if(!rec || !rec.data) return;\n      const data = rec.data;\n      return this.idbGetAll('assets').then(assetRecords=>{\n        const assets = {};\n        assetRecords.forEach(a=>{\n          assets[a.id] = { url: URL.createObjectURL(a.blob), filename:a.filename, mimeType:a.mimeType };\n        });\n        this.setState({\n          items: (data.items && data.items.length) ? data.items : this.state.items,\n          activeItemId: data.activeItemId || (data.items && data.items[0] && data.items[0].id) || this.state.activeItemId,\n          clientInfo: data.clientInfo || this.state.clientInfo,\n          exportSettings: {...this.state.exportSettings, ...(data.exportSettings||{})},\n          companyLogoAssetId: data.companyLogoAssetId || this.state.companyLogoAssetId,\n          assets\n        });\n      });\n    });\n  }\n\n  persistState(){\n    clearTimeout(this.saveTimer);\n    this.setState({saveStatus:'saving'});\n    this.saveTimer = setTimeout(()=>this.flushSave(), 900);\n  }\n\n  flushSave(){\n    if(!this.db) return;\n    const data = {\n      items: this.state.items,\n      clientInfo: this.state.clientInfo,\n      exportSettings: this.state.exportSettings,\n      companyLogoAssetId: this.state.companyLogoAssetId,\n      activeItemId: this.state.activeItemId\n    };\n    this.idbPut('state', {key:'current', data}).then(()=>{\n      this.setState({saveStatus:'saved'});\n    }).catch(err=>{ console.error('save failed', err); this.setState({saveStatus:'saved'}); });\n  }\n\n  saveDraftNow(){ clearTimeout(this.saveTimer); this.flushSave(); }\n\n  uploadAsset(file){\n    return new Promise((resolve,reject)=>{\n      const id = this.uid();\n      const url = URL.createObjectURL(file);\n      this.idbPut('assets', {id, blob:file, filename:file.name, mimeType:file.type}).then(()=>{\n        this.setState(prev=>({assets:{...prev.assets, [id]:{url, filename:file.name, mimeType:file.type}}}));\n        resolve(id);\n      }).catch(reject);\n    });\n  }\n\n  getActiveItem(){ return this.state.items.find(i=>i.id===this.state.activeItemId); }\n\n  updateActiveItem(updater){\n    this.setState(prev=>{\n      const items = prev.items.map(it=> it.id===prev.activeItemId ? {...it, ...updater(it)} : it);\n      return {items};\n    }, ()=>this.persistState());\n  }\n\n  toggleLeftPanel(){ this.setState(prev=>({leftPanelVisible: !prev.leftPanelVisible}), ()=> setTimeout(()=>this.resizeCanvasToFit(), 260)); }\n  toggleCopyPanel(){ this.setState(prev=>({copyPanelOpen: !prev.copyPanelOpen})); }\n\n  zoomIn(){ if(!this.fabricCanvas) return; const z = Math.min(4, this.fabricCanvas.getZoom()*1.2); this.fabricCanvas.setZoom(z); this.setState({zoomLevel:z}); }\n  zoomOut(){ if(!this.fabricCanvas) return; const z = Math.max(0.2, this.fabricCanvas.getZoom()/1.2); this.fabricCanvas.setZoom(z); this.setState({zoomLevel:z}); }\n  zoomReset(){ if(!this.fabricCanvas) return; this.fabricCanvas.setZoom(1); this.setState({zoomLevel:1}); }\n\n  getSelectedObj(){ return this.fabricCanvas && this.fabricCanvas.getActiveObject(); }\n\n  setSelectedWidth(e){\n    const obj = this.getSelectedObj();\n    const w = parseFloat(e.target.value);\n    if(!obj || !w || !obj.width) return;\n    obj.set({scaleX: w/obj.width});\n    obj.setCoords();\n    this.fabricCanvas.requestRenderAll();\n    this.syncCanvasJSON();\n    this.setState(prev aUrl, x, y, w, h, photoSizePct, notesFontSize, notesColorRgb, orientation){\n    const pad = 12;\n    const d = item.details || {};\n    const pct = (photoSizePct||52)/100;\n    let imgArea, specArea;\n    if(orientation==='v'){\n      const imgH = Math.min(h*pct, h-90);\n      imgArea = {x:x+pad, y:y+pad, w:w-2*pad, h:imgH-pad};\n      specArea = {x:x+pad, y:y+pad+imgH+6, w:w-2*pad, h:h-imgH-pad*2-6};\n    } else {\n      const imgW = Math.min(w*pct, w-140);\n      imgArea = {x:x+pad, y:y+pad, w:imgW-pad, h:h-2*pad};\n      specArea = {x:x+pad+imgW+6, y:y+pad, w:w-imgW-pad*2-6, h:h-2*pad};\n    }\n\n    doc.setDrawColor(226,232,240); doc.setLineWidth(1);\n    doc.roundedRect(x,y,w,h,8,8,'S');\n\n    doc.setDrawColor(226,232,240); doc.setFillColor(250,251,252);\n    doc.roundedRect(imgArea.x, imgArea.y, imgArea.w, imgArea.h, 6,6,'FD');\n    if(imgDataUrl){\n      const inset = 8;\n      const fitSize = Math.min(imgArea.w-inset*2, imgArea.h-inset*2);\n      const ix = imgArea.x + (imgArea.w-fitSize)/2;\n      const iy = imgArea.y + (imgArea.h-fitSize)/2;\n      doc.addImage(imgDataUrl,'PNG', ix, iy, fitSize, fitSize);\n    }\n\n    doc.setFont('helvetica','bold'); doc.setFontSize(12.5); doc.setTextColor(15,23,42);\n    const titleLines = doc.splitTextToSize(d.productName||item.label, specArea.w);\n    doc.text(titleLines, specArea.x, specArea.y+12);\n    let ty = specArea.y + 12 + titleLines.length*14 + 10;\n    const bottom = specArea.y+specArea.h-4;\n\n    if(item.detailsMode==='freeform' && item.freeformHtml){\n      const blocks = this.parseFreeformBlocks(item.freeformHtml);\n      ty = this.fitAndDrawFreeform(doc, blocks, specArea.x, ty, specArea.w, bottom-ty);\n    } else {\n      if(ty<=bottom && (d.colour||d.size||d.material)){\n        const vals = [d.colour, d.size, d.material].filter(Boolean).join(' · ');\n        ty = this.drawSpecRow(doc, specArea.x, ty, specArea.w, 'Colour / Size / Material', doc.splitTextToSize(vals||'—', specArea.w));\n      }\n laimer, pageW-2*margin) : [];\n        doc.setDrawColor(226,232,240); doc.line(margin, fy-8, pageW-margin, fy-8);\n        doc.text(wrapped, margin, fy);\n        fy += wrapped.length*10 + 6;\n        if(settings.includeTerms && settings.termsText){\n          doc.setFontSize(6.5); doc.setTextColor(180,185,195);\n          const termsWrapped = doc.splitTextToSize(settings.termsText, pageW-2*margin);\n          doc.text(termsWrapped.slice(0,3), margin, fy);\n          fy += termsWrapped.slice(0,3).length*8;\n        }\n        if(settings.includePageNumbers){\n          doc.setFontSize(8); doc.setTextColor(203,213,225);\n          doc.text('Page '+pageNum+' of '+totalPages, pageW-margin, pageH-margin+8, {align:'right'});\n        }\n      };\n\n      const contentTop = teal+18+headerH+8;\n      const contentBottom = pageH-margin-footerH;\n      const contentH = contentBottom-contentTop;\n      const contentW = pageW-2*margin;\n      const gap = 14;\n      const slotW = (contentW-(cols-1)*gap)/cols;\n\n      let noteBoxH = 0, noteShownLines = [];\n      if(settings.extraNotes){\n        doc.setFont('helvetica','normal'); doc.setFontSize(15);\n        const noteWrapped = doc.splitTextToSize(settings.extraNotes, contentW-24);\n        const noteLineH = 18;\n        const maxNoteH = contentH*0.4;\n        noteBoxH = Math.min(maxNoteH, 24 + noteWrapped.length*noteLineH);\n        const maxLines = Math.max(1, Math.floor((noteBoxH-24)/noteLineH));\n        noteShownLines = noteWrapped.slice(0, maxLines);\n      }\n\n      for(let p=0;p<totalPages;p++){\n        if(p>0) doc.addPage();\n        drawHeader(p===0);\n        const isLastPage = p===totalPages-1;\n        const reserved = (isLastPage && settings.extraNotes) ? noteBoxH+16 : 0;\n        const pageContentBottom = contentBottom - reserved;\n        const pageContentH = pageContentBottom - contentTop;\n        const slotH = (pageContentH-(rows-1)*gap)/rows;\n        for(let s=0;s<perPage;s++){\n          const idx = p*
